<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>模型供应商连接</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
  <script src="/app.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand-mark" aria-hidden="true"><i data-lucide="network"></i></div>
    <strong>Model Link</strong>
    <span>供应商连接验证</span>
  </header>

  <main class="page-shell">
    <section class="workspace" aria-labelledby="page-title">
      <header class="workspace-header">
        <div>
          <p class="eyebrow">MODEL PROVIDER</p>
          <h1 id="page-title">模型供应商连接</h1>
        </div>
        <span class="connection-badge is-idle" id="connection-badge">
          <i data-lucide="circle-dot"></i>
          <span>未测试</span>
        </span>
      </header>

      <form id="provider-form" class="provider-form">
        <label class="field">
          <span>供应商名称 <small>选填</small></span>
          <input id="provider-name" type="text" maxlength="120" placeholder="例如：企业模型网关">
        </label>

        <label class="field">
          <span>官网链接 <small>选填</small></span>
          <input id="website-url" type="url" maxlength="2048" placeholder="https://example.com">
        </label>

        <label class="field">
          <span>API Key <b>*</b></span>
          <span class="input-with-action">
            <input id="api-key" type="password" maxlength="4096" autocomplete="off" required placeholder="输入 API Key">
            <button id="toggle-key" type="button" class="field-icon-button" aria-label="显示 API Key" title="显示 API Key">
              <i data-lucide="eye"></i>
            </button>
          </span>
        </label>

        <label class="field">
          <span>BASE_URL <b>*</b></span>
          <input id="base-url" type="url" maxlength="2048" required placeholder="https://api.example.com">
        </label>
      </form>

      <div class="action-bar">
        <button id="latency-button" type="button" class="button button-secondary" data-loading-label="测速中">
          <span class="button-icon"><i data-lucide="gauge"></i></span>
          <span class="button-label">测速</span>
        </button>
        <button id="models-button" type="button" class="button button-primary" data-loading-label="获取中">
          <span class="button-icon"><i data-lucide="download"></i></span>
          <span class="button-label">获取模型</span>
        </button>
        <button id="add-model-button" type="button" class="button button-tertiary" disabled>
          <span class="button-icon"><i data-lucide="plus"></i></span>
          <span class="button-label">添加模型</span>
          <i class="button-chevron" data-lucide="chevron-down"></i>
        </button>
      </div>

      <section class="connection-status" aria-label="连接状态">
        <div class="status-primary">
          <span class="status-icon"><i data-lucide="activity"></i></span>
          <div>
            <span>连接状态</span>
            <strong id="status-title">等待测试</strong>
          </div>
        </div>
        <div class="metric">
          <span>访问延迟</span>
          <strong id="latency-value">--</strong>
        </div>
        <div class="metric metric-wide">
          <span>协议 / 模型端点</span>
          <strong id="protocol-value">--</strong>
          <small id="endpoint-value">尚未获取模型</small>
        </div>
        <div class="metric metric-count">
          <span>发现模型</span>
          <strong id="model-count">0</strong>
        </div>
      </section>

      <section id="model-chooser" class="model-chooser is-hidden" aria-label="添加模型">
        <label class="chooser-field">
          <span>已发现模型</span>
          <select id="discovered-model-select" disabled>
            <option value="">暂无可选模型</option>
          </select>
        </label>
        <span class="chooser-or">或</span>
        <label class="chooser-field">
          <span>手工模型名称</span>
          <input id="manual-model" type="text" maxlength="200" placeholder="例如：deepseek-chat">
        </label>
        <button id="confirm-model-button" type="button" class="button button-confirm">
          <span class="button-icon"><i data-lucide="check"></i></span>
          <span class="button-label">确认添加</span>
        </button>
      </section>

      <section class="selected-section" aria-labelledby="selected-title">
        <header>
          <div>
            <h2 id="selected-title">已添加模型</h2>
            <span id="selected-count">0 个</span>
          </div>
        </header>
        <div id="selected-models" class="selected-models">
          <div class="empty-state" id="empty-state">
            <i data-lucide="box"></i>
            <span>暂无已添加模型</span>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
